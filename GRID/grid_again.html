<html>
    <head>
        <title>grid practice 1 </title>
    </head>
    <body style="padding-bottom: 1000;">
        <div style="display: grid;
        grid-template-columns: 100px 100px 200px;
        margin-top: 30px;">
            <div style="background-color: aqua;">100px</div>
            <div style="background-color: brown;">100px <p>text</p></div>
            <div style="background-color: brown;">200px <p>text</p></div>
            <div style="background-color: rgb(9, 20, 165);">100px</div> 
        </div>

        <div style="display: grid;
        grid-template-columns: 100px 1fr;
        margin-top: 30px;">
            <div style="background-color: aqua;">div 1</div>
            <div style="background-color: brown;">div 2 <p>text</p></div>
        </div>

        <div style="display: grid;
        grid-template-columns: 100px 1fr 2fr;
        margin-top: 30px;">
            <div style="background-color: aqua;">div 1</div>
            <div style="background-color: brown;">div 2 <p>text</p></div>
            <div style="background-color: aqua;">div 1</div>
        </div>

        <div style="display: grid;
        grid-template-columns: 1fr 1fr 1fr;
        margin-top: 30px;
        column-gap: 20px;
        row-gap: 40px;">
            <div style="background-color: rgb(196, 207, 32); height: 200px;">1 fr</div>
            <div style="background-color: rgb(49, 179, 49); height: 200px;">1 fr </div>
            <div style="background-color: rgb(196, 207, 32); height: 200px;">1 fr</div>
            <div style="background-color: rgb(49, 179, 49); height: 200px;">1 fr </div>
            <div style="background-color: rgb(196, 207, 32); height: 200px;">1 fr</div>
            <div style="background-color: rgb(49, 179, 49); height: 200px;">1 fr </div>
        </div>
    </body>
    </body>
 </html>
